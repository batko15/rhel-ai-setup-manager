# RHEL AI Setup - System Limits
# /etc/security/limits.d/99-rhel-ai.conf

# ==========================================
# All Users - Standard Limits
# ==========================================
* soft nofile 1048576
* hard nofile 1048576
* soft nproc 65535
* hard nproc 65535
* soft memlock unlimited
* hard memlock unlimited
* soft stack unlimited
* hard stack unlimited

# ==========================================
# Root - Erweiterte Limits
# ==========================================
root soft nofile 1048576
root hard nofile 1048576
root soft nproc 65535
root hard nproc 65535
root soft memlock unlimited
root hard memlock unlimited
root soft stack unlimited
root hard stack unlimited

# ==========================================
# AI-Services User (falls vorhanden)
# ==========================================
ollama soft nofile 1048576
ollama hard nofile 1048576
ollama soft nproc 65535
ollama hard nproc 65535
ollama soft memlock unlimited
ollama hard memlock unlimited

# ==========================================
# GPU-Services User (falls vorhanden)
# ==========================================
nvidia soft nofile 1048576
nvidia hard nofile 1048576
nvidia soft nproc 65535
nvidia hard nproc 65535
